apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  labels:
    app: notification-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: smart-healthcare-notification-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4006
          env:
            - name: PORT
              value: "4006"
            - name: SMTP_HOST
              value: ""
            - name: SMTP_PORT
              value: "587"
            - name: SMTP_USER
              value: ""
            - name: SMTP_PASS
              value: ""
            - name: SMTP_FROM
              value: "smart-healthcare@example.com"
