version: "3.9"

services:
  mongodb:
    image: mongo:7
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  auth-service:
    build: ./services/auth-service
    container_name: auth-service
    ports:
      - "5001:5001"
    env_file:
      - ./services/auth-service/.env
    depends_on:
      - mongodb

  patient-service:
    build: ./services/patient-service
    container_name: patient-service
    ports:
      - "5002:5002"
    env_file:
      - ./services/patient-service/.env
    depends_on:
      - mongodb

  notification-service:
    build: ./services/notification-service
    container_name: notification-service
    ports:
      - "5006:5006"
    env_file:
      - ./services/notification-service/.env
  appointment-service:
    build: ./services/appointment-service
    container_name: appointment-service
    ports:
      - "5003:5003"
    env_file:
      - ./services/appointment-service/.env
    depends_on:
      - mongodb

  payment-service:
    build: ./services/payment-service
    container_name: payment-service
    ports:
      - "5004:5004"
    env_file:
      - ./services/payment-service/.env
    depends_on:
      - mongodb

  doctor-service:
    build: ./services/doctor-service
    container_name: doctor-service
    ports:
      - "5005:5005"
    env_file:
      - ./services/doctor-service/.env
    depends_on:
      - mongodb

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "5000:5000"
    env_file:
      - ./api-gateway/.env
    depends_on:
      - auth-service
      - patient-service
      - notification-service
      - appointment-service
      - payment-service
      - doctor-service

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:5000/api
      - VITE_GROQ_API_KEY=${VITE_GROQ_API_KEY}
    depends_on:
      - api-gateway

volumes:
  mongo_data: